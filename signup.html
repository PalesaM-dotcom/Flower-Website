<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Pretty Blooms</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* SIGNUP PAGE STYLING */
    .signup-page {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }

    .signup-page h1 {
      color: #a15596; /* purple */
      font-size: 36px;
      margin-bottom: 30px;
    }

    .signup-page label {
      display: block;
      font-weight: 500;
      margin-bottom: 5px;
      color: #000;
      text-align: left;
    }

    .signup-page input[type="text"],
    .signup-page input[type="email"],
    .signup-page input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .signup-btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background-color: #a15596; /* purple */
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .signup-btn:hover {
      background-color: #8a3b80;
      transform: scale(1.02);
    }

    .signin-link {
      margin-top: 20px;
      font-size: 14px;
      color: #000;
    }

    .signin-link a {
      color: #a15596; /* purple */
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
    }

    .signin-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <section class="signup-page">
    <h1>Sign Up</h1>

    <form id="signupForm">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="signin-link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>
  </section>

  <!-- JAVASCRIPT FOR POPUP -->
  <script>
    const form = document.getElementById('signupForm');

    form.addEventListener('submit', function(event) {
      event.preventDefault(); // prevents form from submitting normally
      alert("Thank you! Your account has been successfully created.");
      form.reset(); // clears the form fields
    });
  </script>
</body>
</html>
