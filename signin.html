<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Pretty Blooms</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#e75480;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#d63a66;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
text-decoration:none;
color:#e75480;
}

.home-btn{
display:block;
text-align:center;
margin-top:20px;
padding:10px;
background:#a73f83;
color:rgb(35, 18, 29);
text-decoration:none;
border-radius:5px;
}

.home-btn:hover{
background:#9b4e79;
}

</style>
</head>

<body>

<div class="container">

<h1>Sign In</h1>

<form>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" placeholder="Enter your password" required>

<button type="submit">Sign In</button>

</form>

<div class="links">
<p>Don't have an account? <a href="signup.html">Create Account</a></p>
</div>

<a href="index.html" class="home-btn">Back to Home</a>

</div>

</body>
</html>
