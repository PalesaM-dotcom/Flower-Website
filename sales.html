<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Special Sales - Pretty Blooms</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* CENTER CONTENT */
    .sales-page {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .sales-page h1 {
      font-size: 50px;
      color: #a15596; /* purple */
    }

    /* RETURN TO HOME BUTTON */
    .home-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 30px;
      background-color: #a15596; /* purple */
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s ease;
    }

    /* HOVER EFFECT */
    .home-btn:hover {
      background-color: #8a3b80;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<section class="sales-page">
  <div>
    <h1>No current sales!</h1>

    <!-- RETURN BUTTON -->
    <a href="index.html" class="home-btn">Return to Home</a>
  </div>
</section>

</body>
</html>
