<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Pretty Blooms</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      max-width: 600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    label {
      font-weight: bold;
    }
    input, textarea, select {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 100%;
    }
    #cart-items {
      margin-bottom: 20px;
    }
    #cart-items table {
      width: 100%;
      border-collapse: collapse;
    }
    #cart-items th, #cart-items td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    #cart-items img {
      width: 50px;
    }
    #total {
      font-weight: bold;
    }
    button.place-order {
      padding: 15px;
      background-color: #f718b4;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
      max-width: 300px;
      align-self: center;
    }
    button.place-order:hover {
      background-color: #971f6f;
    }
    #thank-you {
      display: none;
      text-align: center;
      font-size: 20px;
      color: #4CAF50;
      margin-top: 20px;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      #cart-items table, #cart-items th, #cart-items td {
        font-size: 14px;
      }
      button.place-order {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <h2>Checkout</h2>

  <!-- Cart summary -->
  <div id="cart-items">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody>
        <!-- Cart items will be rendered here -->
      </tbody>
    </table>
    <h3>Total: R<span id="total">0.00</span></h3>
  </div>

  <!-- Checkout form -->
  <form id="checkout-form">
    <h3>Billing Details</h3>
    <label for="name">Full Name:</label>
    <input type="text" id="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="address">Address:</label>
    <textarea id="address" rows="3" required></textarea>

    <label for="city">City:</label>
    <input type="text" id="city" required>

    <label for="postal">Postal Code:</label>
    <input type="text" id="postal" required>

    <h3>Payment Details</h3>
    <label for="card-name">Name on Card:</label>
    <input type="text" id="card-name" required>

    <label for="card-number">Card Number:</label>
    <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>

    <label for="expiry">Expiry Date:</label>
    <input type="text" id="expiry" placeholder="MM/YY" required>

    <label for="cvv">CVV:</label>
    <input type="text" id="cvv" placeholder="123" required>

    <button type="submit" class="place-order">Place Order</button>
  </form>

  <!-- Thank you message -->
  <div id="thank-you">
    🎉 Thank you for your order! Your flowers will arrive fresh and beautiful. 🌸
  </div>

  <script>
    // Load cart from localStorage
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartBody = document.querySelector("#cart-items tbody");
    const totalEl = document.getElementById("total");
    const thankYou = document.getElementById("thank-you");
    const form = document.getElementById("checkout-form");

    function renderCart() {
      cartBody.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        let subtotal = item.price * item.quantity;
        total += subtotal;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.name}</td>
          <td>R${item.price.toFixed(2)}</td>
          <td>${item.quantity}</td>
          <td>R${subtotal.toFixed(2)}</td>
        `;
        cartBody.appendChild(row);
      });
      totalEl.innerText = total.toFixed(2);
    }

    renderCart();

    // Handle form submission
    form.addEventListener("submit", (e) => {
      e.preventDefault(); // Prevent actual form submission

      if(cart.length === 0){
        alert("Your cart is empty!");
        return;
      }

      // Optional: you could validate card format here

      // Show thank you message
      form.style.display = "none";
      thankYou.style.display = "block";

      // Clear cart
      localStorage.removeItem("cart");
    });
  </script>
</body>
</html>
